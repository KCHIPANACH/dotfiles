# ════════════════════════════════════════════════════════════════
#  tmux.conf — configuración base
# ════════════════════════════════════════════════════════════════

# ── Prefix: Ctrl+a (más cómodo que el Ctrl+b por defecto) ──────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Comportamiento general ─────────────────────────────────────
set -g mouse on                       # mouse: click, scroll, redimensionar
set -g base-index 1                   # ventanas empiezan en 1
setw -g pane-base-index 1             # panes empiezan en 1
set -g renumber-windows on            # renumera al cerrar una ventana
set -g history-limit 100000           # scrollback grande
set -sg escape-time 10                # menos lag con vim/nvim
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # true color

# ── Splits: | (vertical) y - (horizontal), abren en el cwd ─────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Navegar panes con Alt+flechas (sin prefix) ─────────────────
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# ── Modo copia estilo vi ───────────────────────────────────────
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# ── Recargar config: prefix + r ────────────────────────────────
bind r source-file ~/.tmux.conf \; display "✅ tmux.conf recargado"

# ════════════════════════════════════════════════════════════════
#  Barra de estado — colores Catppuccin Mocha
# ════════════════════════════════════════════════════════════════
set -g status-position top
set -g status-interval 3
set -g status-justify left

# colores base
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# lado izquierdo: nombre de sesión
set -g status-left-length 40
set -g status-left "#[bg=#a6e3a1,fg=#1e1e2e,bold]  #S #[bg=#1e1e2e,fg=#a6e3a1]"

# lado derecho: métricas del sistema (CPU·RAM·disco) + fecha y hora
# Las métricas las genera ~/.config/tmux/metrics.sh, refrescado cada status-interval.
set -g status-right-length 150
set -g status-right "#(~/.config/tmux/metrics.sh)  #[fg=#89b4fa]#[bg=#89b4fa,fg=#1e1e2e] 󰃭 %d-%m-%Y #[bg=#89b4fa,fg=#cba6f7]#[bg=#cba6f7,fg=#1e1e2e]  %H:%M "

# ventanas
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[bg=#fab387,fg=#1e1e2e,bold] #I:#W "

# bordes de panes
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#a6e3a1"

# mensajes
set -g message-style "bg=#fab387,fg=#1e1e2e"

# ── Teclas extendidas (Shift+Enter, Ctrl+Enter, etc. para Claude Code) ──
set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'
